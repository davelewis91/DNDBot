champion:
  name: Champion
  parent_class: fighter
  description: A Champion focuses on the development of raw physical power honed to deadly perfection. Those who model themselves on this archetype combine rigorous training with physical excellence to deal devastating blows.
  features:
    - name: Improved Critical
      level: 3
      description: Your weapon attacks score a critical hit on a roll of 19 or 20.
      mechanic:
        type: passive
        extra_data:
          critical_range: [19, 20]

    - name: Remarkable Athlete
      level: 7
      description: You can add half your proficiency bonus (round up) to any Strength, Dexterity, or Constitution check you make that doesn't already use your proficiency bonus. In addition, when you make a running long jump, the distance you can cover increases by a number of feet equal to your Strength modifier.
      mechanic:
        type: passive
        extra_data:
          half_proficiency_to: [strength, dexterity, constitution]

    - name: Additional Fighting Style
      level: 10
      description: You can choose a second option from the Fighting Style feature.
      mechanic:
        type: passive

    - name: Superior Critical
      level: 15
      description: Your weapon attacks score a critical hit on a roll of 18-20.
      mechanic:
        type: passive
        extra_data:
          critical_range: [18, 19, 20]

    - name: Survivor
      level: 18
      description: You attain the pinnacle of resilience in battle. At the start of each of your turns, you regain hit points equal to 5 + your Constitution modifier if you have no more than half of your hit points left. You don't gain this benefit if you have 0 hit points.
      mechanic:
        type: passive
        extra_data:
          heal_per_turn: true
          base_heal: 5
          add_con_mod: true