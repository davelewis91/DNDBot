berserker:
  name: Path of the Berserker
  parent_class: barbarian
  description: For some barbarians, rage is a means to an end—that end being violence. The Path of the Berserker is a path of untrammeled fury, slick with blood. As you enter the berserker's rage, you thrill in the chaos of battle.
  features:
    - name: Frenzy
      level: 3
      description: You can go into a frenzy when you rage. If you do so, for the duration of your rage you can make a single melee weapon attack as a bonus action on each of your turns after this one.
      mechanic:
        type: passive
        extra_data:
          bonus_action_attack: true
          requires_rage: true

    - name: Mindless Rage
      level: 6
      description: You can't be charmed or frightened while raging. If you are charmed or frightened when you enter your rage, the effect is suspended for the duration of the rage.
      mechanic:
        type: passive
        extra_data:
          immunity_while_raging: [charmed, frightened]

    - name: Intimidating Presence
      level: 10
      description: You can use your action to frighten someone with your menacing presence. When you do so, choose one creature that you can see within 30 feet. If the creature can see or hear you, it must succeed on a Wisdom saving throw (DC equal to 8 + your proficiency bonus + your Charisma modifier) or be frightened of you until the end of your next turn.
      mechanic:
        type: passive
        extra_data:
          action_cost: true
          range: 30
          save_dc: 8 + proficiency + charisma
          condition: frightened

    - name: Retaliation
      level: 14
      description: When you take damage from a creature that is within 5 feet of you, you can use your reaction to make a melee weapon attack against that creature.
      mechanic:
        type: reaction
        extra_data:
          trigger: take_damage
          range: 5