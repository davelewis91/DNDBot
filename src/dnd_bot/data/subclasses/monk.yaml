way_of_the_open_hand:
  name: Way of the Open Hand
  parent_class: monk
  description: Monks of the Way of the Open Hand are the ultimate masters of martial arts combat, whether armed or unarmed. They learn techniques to push and trip their opponents, manipulate ki to heal damage to their bodies, and practice advanced meditation that can protect them from harm.
  features:
    - name: Open Hand Technique
      level: 3
      description: Whenever you hit a creature with one of the attacks granted by your Flurry of Blows, you can impose one of the following effects on that target. It must succeed on a Dexterity saving throw or be knocked prone. It must make a Strength saving throw. If it fails, you can push it up to 15 feet away from you. It can't take reactions until the end of your next turn.
      mechanic:
        type: passive
        extra_data:
          requires_flurry: true
          options:
            - save: dexterity
              effect: prone
            - save: strength
              effect: push
              distance: 15
            - effect: no_reactions

    - name: Wholeness of Body
      level: 6
      description: You gain the ability to heal yourself. As an action, you can regain hit points equal to three times your monk level. You must finish a long rest before you can use this feature again.
      mechanic:
        type: resource
        resource_name: Wholeness of Body
        uses_per_rest: 1
        recover_on: long
        extra_data:
          heal_formula: level * 3

    - name: Tranquility
      level: 11
      description: You can enter a special meditation that surrounds you with an aura of peace. At the end of a long rest, you gain the effect of a sanctuary spell that lasts until the start of your next long rest (the spell can end early as normal).
      mechanic:
        type: passive
        extra_data:
          grants_sanctuary: true
          duration: until_long_rest

    - name: Quivering Palm
      level: 17
      description: You gain the ability to set up lethal vibrations in someone's body. When you hit a creature with an unarmed strike, you can spend 3 focus points to start these imperceptible vibrations, which last for a number of days equal to your monk level. You can use your action to end the vibrations, forcing the target to make a Constitution save or be reduced to 0 HP. On a success, it takes 10d10 necrotic damage.
      mechanic:
        type: passive
        extra_data:
          focus_cost: 3
          save: constitution
          damage_on_success: 10d10
          damage_type: necrotic