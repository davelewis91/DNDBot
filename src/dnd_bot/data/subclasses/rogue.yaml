thief:
  name: Thief
  parent_class: rogue
  description: You hone your skills in the larcenous arts. Burglars, bandits, cutpurses, and other criminals typically follow this archetype, but so do rogues who prefer to think of themselves as professional treasure seekers.
  features:
    - name: Fast Hands
      level: 3
      description: You can use the Bonus Action granted by Cunning Action to make a Dexterity (Sleight of Hand) check, use your thieves' tools to disarm a trap or open a lock, or take the Use an Object action.
      mechanic:
        type: passive
        extra_data:
          bonus_actions: [Sleight of Hand, Thieves' Tools, Use Object]

    - name: Second-Story Work
      level: 3
      description: You gain the ability to climb faster than normal; climbing no longer costs you extra movement. In addition, when you make a running jump, the distance you cover increases by a number of feet equal to your Dexterity modifier.
      mechanic:
        type: passive
        extra_data:
          climb_speed: normal
          jump_bonus: dexterity

    - name: Supreme Sneak
      level: 9
      description: You have advantage on a Dexterity (Stealth) check if you move no more than half your speed on the same turn.
      mechanic:
        type: passive
        extra_data:
          advantage_on_stealth: true
          requires_half_speed: true

    - name: Use Magic Device
      level: 13
      description: You have learned enough about the workings of magic that you can improvise the use of items even when they are not intended for you. You ignore all class, race, and level requirements on the use of magic items.
      mechanic:
        type: passive
        extra_data:
          ignore_item_requirements: true

    - name: Thief's Reflexes
      level: 17
      description: You have become adept at laying ambushes and quickly escaping danger. You can take two turns during the first round of any combat. You take your first turn at your normal initiative and your second turn at your initiative minus 10.
      mechanic:
        type: passive
        extra_data:
          extra_first_round_turn: true
          second_turn_initiative: -10