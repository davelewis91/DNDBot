# Consumable definitions for D&D 5e (2024 edition)
# Values are in copper pieces (1 gp = 100 cp, 1 sp = 10 cp)

potion_of_healing:
  name: Potion of Healing
  description: A red liquid that glimmers when agitated. Heals 2d4+2 HP.
  effect: Regain 2d4+2 hit points when you drink this potion.
  healing_dice: "2d4+2"
  rarity: common
  weight: 0.5
  value: 5000

