# Armor definitions for D&D 5e (2024 edition)
# Values are in copper pieces (1 gp = 100 cp, 1 sp = 10 cp)

# Light Armor
padded:
  name: Padded Armor
  description: Quilted layers of cloth and batting.
  armor_type: light
  base_ac: 11
  max_dex_bonus: null  # No cap on DEX
  stealth_disadvantage: true
  weight: 8.0
  value: 500

leather:
  name: Leather Armor
  description: Leather breastplate and shoulder protectors.
  armor_type: light
  base_ac: 11
  max_dex_bonus: null
  stealth_disadvantage: false
  weight: 10.0
  value: 1000

studded_leather:
