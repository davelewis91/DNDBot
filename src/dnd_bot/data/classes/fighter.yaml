name: fighter
hit_die: 10
saving_throws:
  - strength
  - constitution
skill_choices:
  - acrobatics
  - animal_handling
  - athletics
  - history
  - insight
  - intimidation
  - perception
  - survival
num_skill_choices: 2
armor_proficiencies:
  - Light Armor
  - Medium Armor
  - Heavy Armor
  - Shields
weapon_proficiencies:
  - Simple Weapons
  - Martial Weapons

features:
  - name: Fighting Style
    level: 1
    description: You have trained in a particular style of combat. Choose a Fighting Style option.
    mechanic:
      type: passive

  - name: Second Wind
    level: 1
    description: You have a limited well of stamina. On your turn, you can use a Bonus Action to regain Hit Points equal to 1d10 plus your Fighter level. Once you use this feature, you must finish a Short or Long Rest before you can use it again.
    mechanic:
      type: resource
      resource_name: Second Wind
      uses_per_rest: 1
      recover_on: short
      dice: "1d10"
      extra_data:
        add_level: true

  - name: Weapon Mastery
    level: 1
    description: Your training with weapons allows you to use the mastery properties of weapons.
    mechanic:
      type: passive

  - name: Action Surge
    level: 2
    description: You can push yourself beyond your normal limits. On your turn, you can take one additional action. Once you use this feature, you must finish a Short or Long Rest before you can use it again.
    mechanic:
      type: resource
      resource_name: Action Surge
      uses_per_rest: 1
      recover_on: short

  - name: Tactical Mind
    level: 2
    description: You have a mind for tactics. When you fail an ability check, you can expend a use of Second Wind to add 1d10 to the roll.
    mechanic:
      type: passive
      extra_data:
        uses_second_wind: true
        dice: "1d10"

  - name: Fighter Subclass
    level: 3
    description: You gain a Fighter subclass of your choice.

  - name: Ability Score Improvement
    level: 4
    description: You can increase one ability score by 2, or two ability scores by 1.

  - name: Extra Attack
    level: 5
    description: You can attack twice, instead of once, whenever you take the Attack action.
    mechanic:
      type: passive
      extra_data:
        extra_attacks: 1