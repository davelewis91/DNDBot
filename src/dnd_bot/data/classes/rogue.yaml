name: rogue
hit_die: 8
saving_throws:
  - dexterity
  - intelligence
skill_choices:
  - acrobatics
  - athletics
  - deception
  - insight
  - intimidation
  - investigation
  - perception
  - performance
  - persuasion
  - sleight_of_hand
  - stealth
num_skill_choices: 4
armor_proficiencies:
  - Light Armor
weapon_proficiencies:
  - Simple Weapons
  - Martial Weapons with Finesse or Light property

features:
  - name: Expertise
    level: 1
    description: You gain Expertise in two of your skill proficiencies.
    mechanic:
      type: passive

  - name: Sneak Attack
    level: 1
    description: Once per turn, you can deal extra damage to one creature you hit with an attack roll if you have Advantage on the roll and are using a Finesse or Ranged weapon. The extra damage is 1d6 (increases with level).
    mechanic:
      type: passive
      dice_per_level: "1d6"
      extra_data:
        levels_per_die: 2
        once_per_turn: true

  - name: Thieves' Cant
    level: 1
    description: You know Thieves' Cant, a secret mix of dialect, jargon, and code.
    mechanic:
      type: passive

  - name: Weapon Mastery
    level: 1
    description: Your training with weapons allows you to use the mastery properties of weapons.
    mechanic:
      type: passive

  - name: Cunning Action
    level: 2
    description: You can take a Bonus Action to take the Dash, Disengage, or Hide action.
    mechanic:
      type: passive
      extra_data:
        bonus_actions:
          - Dash
          - Disengage
          - Hide

  - name: Rogue Subclass
    level: 3
    description: You gain a Rogue subclass of your choice.

  - name: Steady Aim
    level: 3
    description: As a Bonus Action, you give yourself Advantage on your next attack roll on the current turn. Your Speed becomes 0 until the end of the turn.
    mechanic:
      type: passive
      extra_data:
        grants_advantage: true
        sets_speed_zero: true

  - name: Ability Score Improvement
    level: 4
    description: You can increase one ability score by 2, or two ability scores by 1.

  - name: Cunning Strike
    level: 5
    description: When you deal Sneak Attack damage, you can forgo some of that damage to apply special effects.
    mechanic:
      type: passive

  - name: Uncanny Dodge
    level: 5
    description: When an attacker you can see hits you with an attack roll, you can use your Reaction to halve the attack's damage against you.
    mechanic:
      type: reaction
      extra_data:
        halves_damage: true