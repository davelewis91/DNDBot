name: monk
hit_die: 8
saving_throws:
  - strength
  - dexterity
skill_choices:
  - acrobatics
  - athletics
  - history
  - insight
  - religion
  - stealth
num_skill_choices: 2
armor_proficiencies: []
weapon_proficiencies:
  - Simple Weapons
  - Martial Weapons with Light property

features:
  - name: Martial Arts
    level: 1
    description: You can use Dexterity instead of Strength for unarmed strikes and Monk weapons. Your unarmed strikes deal 1d6 damage (increases with level).
    mechanic:
      type: passive
      dice: "1d6"
      extra_data:
        use_dex_for_unarmed: true
        scales_at_levels:
          - 5
          - 11
          - 17

  - name: Unarmored Defense
    level: 1
    description: While not wearing armor or wielding a Shield, your AC equals 10 + Dexterity modifier + Wisdom modifier.
    mechanic:
      type: passive
      extra_data:
        ac_formula: 10 + dex + wis
        no_shield: true

  - name: Focus
    level: 2
    description: You can channel your focus to perform extraordinary feats. You have Focus Points equal to your Monk level. You can spend Focus Points on various Focus features.
    mechanic:
      type: resource
      resource_name: Focus Points
      uses_per_rest_formula: level
      recover_on: short

  - name: Monk's Focus
    level: 2
    description: You can use Step of the Wind (Bonus Action Dash or Disengage), Patient Defense (Bonus Action Dodge), or Flurry of Blows (two unarmed strikes as a Bonus Action) by spending Focus Points.
    mechanic:
      type: passive
      extra_data:
        focus_options:
          step_of_the_wind:
            cost: 1
            actions:
              - Dash
              - Disengage
          patient_defense:
            cost: 1
            actions:
              - Dodge
          flurry_of_blows:
            cost: 1
            extra_unarmed_strikes: 2

  - name: Unarmored Movement
    level: 2
    description: Your Speed increases by 10 feet while not wearing armor or a Shield.
    mechanic:
      type: passive
      extra_data:
        speed_bonus: 10

  - name: Deflect Attacks
    level: 3
    description: When you're hit by an attack, you can use your Reaction to reduce the damage. If you reduce the damage to 0, you can spend a Focus Point to make a ranged attack with the deflected projectile or energy.
    mechanic:
      type: reaction
      extra_data:
        reduces_damage: true
        can_redirect: true
        redirect_cost: 1

  - name: Monk Subclass
    level: 3
    description: You gain a Monk subclass of your choice.

  - name: Ability Score Improvement
    level: 4
    description: You can increase one ability score by 2, or two ability scores by 1.

  - name: Extra Attack
    level: 5
    description: You can attack twice, instead of once, whenever you take the Attack action.
    mechanic:
      type: passive
      extra_data:
        extra_attacks: 1

  - name: Stunning Strike
    level: 5
    description: When you hit a creature with a Monk weapon or unarmed strike, you can spend a Focus Point to attempt to stun the target.
    mechanic:
      type: passive
      extra_data:
        focus_cost: 1
        save_dc_ability: wisdom