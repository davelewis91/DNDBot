name: barbarian
hit_die: 12
saving_throws:
  - strength
  - constitution
skill_choices:
  - animal_handling
  - athletics
  - intimidation
  - nature
  - perception
  - survival
num_skill_choices: 2
armor_proficiencies:
  - Light Armor
  - Medium Armor
  - Shields
weapon_proficiencies:
  - Simple Weapons
  - Martial Weapons

features:
  - name: Rage
    level: 1
    description: You can enter a rage as a Bonus Action. While raging, you gain bonus damage on Strength-based attacks, resistance to physical damage, and advantage on Strength checks and saves. You have 2 Rages (increases with level).
    mechanic:
      type: toggle
      resource_name: Rage
      uses_per_rest: 2
      recover_on: long
      extra_data:
        damage_bonus: 2
        resistances:
          - bludgeoning
          - piercing
          - slashing
        advantage_on:
          - strength_checks
          - strength_saves

  - name: Unarmored Defense
    level: 1
    description: While not wearing armor, your AC equals 10 + Dexterity modifier + Constitution modifier. You can use a shield and still gain this benefit.
    mechanic:
      type: passive
      extra_data:
        ac_formula: 10 + dex + con

  - name: Weapon Mastery
    level: 1
    description: Your training with weapons allows you to use the mastery properties of weapons.
    mechanic:
      type: passive

  - name: Danger Sense
    level: 2
    description: You have Advantage on Dexterity saving throws against effects you can see.
    mechanic:
      type: passive
      extra_data:
        advantage_on:
          - dex_saves_visible

  - name: Reckless Attack
    level: 2
    description: You can throw aside all concern for defense to attack with fierce desperation. When you make your first attack on your turn, you can decide to attack recklessly, giving you Advantage on attack rolls using Strength, but attack rolls against you have Advantage until your next turn.
    mechanic:
      type: passive
      extra_data:
        optional: true
        grants_advantage: true
        enemies_have_advantage: true

  - name: Barbarian Subclass
    level: 3
    description: You gain a Barbarian subclass of your choice.

  - name: Primal Knowledge
    level: 3
    description: You gain proficiency in one skill from the Barbarian skill list.
    mechanic:
      type: passive

  - name: Ability Score Improvement
    level: 4
    description: You can increase one ability score by 2, or two ability scores by 1.

  - name: Extra Attack
    level: 5
    description: You can attack twice, instead of once, whenever you take the Attack action.
    mechanic:
      type: passive
      extra_data:
        extra_attacks: 1

  - name: Fast Movement
    level: 5
    description: Your Speed increases by 10 feet while you aren't wearing Heavy Armor.
    mechanic:
      type: passive
      extra_data:
        speed_bonus: 10