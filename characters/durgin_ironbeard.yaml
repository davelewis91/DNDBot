species:
  name: dwarf
  size: medium
  speed: 30
  creature_type: humanoid
  darkvision: 120
  traits:
  - name: Darkvision
    description: You have Darkvision with a range of 120 feet.
  - name: Dwarven Resilience
    description: You have Resistance to Poison damage. You also have Advantage on
      saving throws you make to avoid or end the Poisoned condition.
  - name: Dwarven Toughness
    description: Your Hit Point maximum increases by 1, and it increases by 1 again
      whenever you gain a level.
  - name: Stonecunning
    description: As a Bonus Action, you gain Tremorsense with a range of 60 feet
      for 10 minutes. You must be on a stone surface or touching a stone surface
      to use this Tremorsense. You can use this Bonus Action a number of times equal
      to your Proficiency Bonus, and you regain all expended uses when you finish
      a Long Rest.
  languages:
  - Common
  - Dwarvish
  resistances:
  - Poison
background:
  name: Soldier
  backstory: Durgin served twenty years in the Ironpeak Mountain Guard, defending
    the deep tunnels against goblinoid raids and worse. He rose to sergeant before
    a cave-in claimed half his unit — a disaster he blames on a cowardly officer
    who ordered the retreat too late. He left the Guard with his axe, his armour,
    and a quiet fury he keeps tucked behind iron discipline.
  personality:
    traits:
    - I face problems head-on — a simple direct solution is best
    - I can stare down a hell hound without flinching
    ideals:
    - 'Responsibility: What I start, I finish. No soldier left behind.'
    bonds:
    - I fight for the memory of the unit I lost in the deep tunnels
    flaws:
    - I have a hard time backing down from a fight, even when I should
  motivations:
  - description: Find and confront the officer whose cowardice cost his unit their
      lives
    priority: 1
    is_secret: false
  - description: Recover the regimental banner lost in the cave-in
    priority: 2
    is_secret: false
  - description: Build enough of a reputation to command soldiers of his own again
    priority: 3
    is_secret: false
  fears:
  - Being buried alive
  - Failing soldiers who depend on him
