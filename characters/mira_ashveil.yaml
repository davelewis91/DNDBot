background:
  name: Criminal
  backstory: Mira grew up on the streets of Ashport, learning to pick pockets before
    she could read. She fell in with the Silken Hand thieves' guild at fourteen, and
    spent six years as their best fence and infiltrator. She parted ways (badly) when
    she discovered the guildmaster was selling information to the city watch.
  personality:
    traits:
    - I always have a plan — and a backup plan
    - I speak little and observe much
    ideals:
    - 'Freedom: No cage, literal or figurative, will ever hold me'
    bonds:
    - I owe a debt to an old fence named Corvin who kept me alive as a child
    flaws:
    - I assume everyone has an angle — trust has to be earned, painfully slowly
  motivations:
  - description: Expose the Silken Hand guildmaster to the city watch
    priority: 1
    is_secret: false
  - description: Clear a bounty on her head in Ashport
    priority: 2
    is_secret: false
  - description: Find enough coin to retire somewhere warm
    priority: 3
    is_secret: false
