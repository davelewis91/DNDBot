  - name: Keen Senses
    description: You have proficiency in the Perception skill.
  - name: Trance
    description: You don't need to sleep, and magic can't put you to sleep. You can
      finish a Long Rest in 4 hours if you spend those hours in a trancelike meditation,
      during which you retain consciousness.
